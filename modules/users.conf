---
userGroup: users
defaultGroups:
  - audio
  - cdrom
  - dialout
  - dip
  - floppy
  - lpadmin
  - netdev
  - plugdev
  - scanner
  - sudo
  - video
  - bluetooth
  - network
autologinGroup: autologin
doAutologin: false
sudoersGroup: sudo
setRootPassword: false
doReusePassword: true
passwordRequirements:
  nonempty: true
  minLength: -1
  maxLength: -1
userShell: /bin/bash
