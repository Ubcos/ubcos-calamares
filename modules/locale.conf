---
region: "Americas"
zone: "America"

# Available locales (generated from system)
# Will be populated during build
availableLocales:
  - en_US.UTF-8

# Default locale
defaultLocale: "en_US.UTF-8"

# Generate locale options
geoip:
  style:    "json"
  url:      "https://ipapi.co/json"
  selector: "timezone"

# Keyboard settings
keyboardModel: ""
keyboardLayouts:
  - us
  - gb
  - de
  - fr
  - es
keyboardVariant: ""

# Timezone
timezone: "America/New_York"
